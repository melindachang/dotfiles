# ==========================================
# LANGUAGE SETUP
# ==========================================

[[language]]
name = "bash"
auto-format = true

[[language]]
name = "c"
auto-format = true
formatter = { command = "clang-format", args = ["--style", "Chromium"] }

[[language]]
name = "css"
auto-format = true
formatter = { command = "dprint", args = ["fmt", "--stdin", "css"] }
language-servers = ["vscode-css-languageserver", "tailwindcss-ls"]

[[language]]
name = "dart"
auto-format = true
formatter = { command = "dart", args = ["format"] }

[[language]]
name = "glsl"
auto-format = true
formatter = { command = "clang-format" }

[[language]]
name = "javascript"
auto-format = true
formatter = { command = "dprint", args = ["fmt", "--stdin", "js"] }

[[language]]
name = "json"
auto-format = true
formatter = { command = "dprint", args = ["fmt", "--stdin", "json"] }

[[language]]
name = "jsonc"
auto-format = true
formatter = { command = "dprint", args = ["fmt", "--stdin", "jsonc"] }

[[language]]
name = "kak"
scope = "source.kak"
file-types = ["kak"]
language-servers = ["kakoune-lsp"]

[[language]]
name = "markdown"
language-servers = ["marksman"]

[[language]]
name = "python"
language-servers = ["basedpyright", "ruff"]
file-types = ["py", "pyi", "vpy"]
auto-format = true
formatter = { command = "ruff", args = ["format", "-"] }

[[language]]
name = "rust"
auto-format = true
formatter = { command = "rustfmt" }

[[language]]
name = "scss"
auto-format = true
formatter = { command = "dprint", args = ["fmt", "--stdin", "scss"] }

[[language]]
name = "scheme"
# auto-format = true
# formatter = { command = "raco", args = ["fmt", "--width", "80"] }
language-servers = ["steel-language-server"]

[[language]]
name = "svelte"
auto-format = true
formatter = { command = "dprint", args = ["fmt", "--stdin", "svelte"] }
language-servers = ["svelteserver", "tailwindcss-ls"]

[[language]]
name = "toml"
auto-format = true
roots = ["."]
language-servers = ["taplo"]
formatter = { command = "taplo", args = ["format", "-"] }

[[language]]
name = "tsx"
auto-format = true
formatter = { command = "dprint", args = ["fmt", "--stdin", "tsx"] }

[[language]]
name = "typescript"
auto-format = true
formatter = { command = "dprint", args = ["fmt", "--stdin", "ts"] }

[[language]]
name = "typst"
auto-format = true
formatter = { command = "typstyle" }

[[language]]
name = "yaml"
auto-format = true
formatter = { command = "dprint", args = ["fmt", "--stdin", "yaml"] }

# ==========================================
# LSP CONFIG
# ==========================================

[language-server.harper-ls]
command = "harper-ls"
args = ["--stdio"]
config = { harper-ls = { diagnosticSeverity = "error", linters = { long_sentences = false } } }

[language-server.ruff]
command = "ruff"
args = ["server"]
environment = { "RUFF_TRACE" = "messages" }

[language-server.rust-analyzer.config.check]
command = "clippy"
formatter = { command = "dprint", args = ["fmt", "--stdin", ""] }

[language-server.steel-language-server]
command = "steel-language-server"

[language-server.tailwindcss-ls]
command = "tailwindcss-language-server"
args = ["--stdio"]
