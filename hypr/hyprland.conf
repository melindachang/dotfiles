env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto

################
### MONITORS ###
################

monitor = eDP-1, preferred, 2560x0, 1.6
monitor = HDMI-A-1, 2560x1440@144, 0x0, 1

###################
### MY PROGRAMS ###
###################

$terminal = foot
$fileManager = foot -e yazi

#################
### AUTOSTART ###
#################

# exec-once = ssh-add $HOME/.ssh/id_ed25519_github
exec-once = hyprpm reload
# exec-once = hyprlock
exec-once = waybar
exec-once = wl-paste --watch
exec-once = vicinae server
exec-once = awww-daemon
exec-once = espanso daemon
exec-once = fish -c low_battery_alert
exec-once = swaync
exec-once = fcitx5
exec-once = pactl load-module module-switch-on-connect
exec-once = syncthing serve
exec-once = nm-applet --indicator

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE, 16
env = HYPRCURSOR_SIZE, 16

###################
### PERMISSIONS ###
###################

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#####################
### LOOK AND FEEL ###
#####################

$clr_border_active = rgba(16161DFF) rgba(a292a3AA)
$clr_border = rgba(625e5a66)

general {
  gaps_in = 5
  gaps_out = 10
  border_size = 1
  col.active_border = $clr_border_active
  col.inactive_border = $clr_border
  resize_on_border = false
  allow_tearing = false
  layout = dwindle
}

decoration {
  rounding = 10
  rounding_power = 2
  active_opacity = 0.93
  inactive_opacity = 0.85

  shadow {
    enabled = false
    range = 20
    offset = 4 8
    render_power = 2
    scale = 0.99
    color = rgba(00000044)
  }

  blur {
    enabled = true
    size = 7
    passes = 2

  }
}

group {
  col.border_active = $clr_border_active
  col.border_inactive = $clr_border

  groupbar {
    font_family = monospace
    font_size = 14
    height = 28

    indicator_height = 0
    gradients = true
    # gradient_round_only_edges = false
    gradient_rounding = 8

    col.active = rgba(1f1f28ff)
    col.inactive = rgba(2A2A37d9)
    text_color = rgba(dcd7baff)
    text_color_inactive = rgba(9e9b93ff)
    gaps_in = 3
    gaps_out = 0
    keep_upper_gap = false
  }
}

animations {
  enabled = yes, please :)

  bezier = easeOutQuint,0.23,1,0.32,1
  bezier = linear,0,0,1,1
  bezier = almostLinear,0.5,0.5,0.75,1.0
  bezier = quick,0.15,0,0.1,1

  animation = global, 1, 10, default
  animation = border, 1, 5.39, easeOutQuint
  animation = windows, 1, 4.79, easeOutQuint
  animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
  animation = windowsOut, 1, 1.49, linear, popin 87%
  animation = fadeIn, 1, 1.73, almostLinear
  animation = fadeOut, 1, 1.46, almostLinear
  animation = fade, 1, 3.03, quick
  animation = layers, 1, 3.81, easeOutQuint
  animation = layersIn, 1, 4, easeOutQuint, fade
  animation = layersOut, 1, 1.5, linear, fade
  animation = fadeLayersIn, 1, 1.79, almostLinear
  animation = fadeLayersOut, 1, 1.39, almostLinear

  animation = workspaces, 0

}

dwindle {
  pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = true # You probably want this
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
  disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

plugin {
  hyprbars {
        bar_height = 25
        bar_color = rgb(1f1f28)
        bar_title_enabled = false
        bar_part_of_window = true

        hyprbars-button = rgb(c4746e), 14, , hyprctl dispatch killactive
        hyprbars-button = rgb(699469), 14, , hyprctl dispatch fullscreen 1
        bar_buttons_alignment = left
    }
}


#############
### INPUT ###
#############

input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =

  follow_mouse = 1

  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

  touchpad {
    natural_scroll = true
  }
}

# gestures {
#   workspace_swipe = false
# }

cursor {
  no_hardware_cursors = true
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, W, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, L, exec, hyprlock

# launch favorites
bind = CTRL, 1, exec, foot -T cava -e cava

# layout
bind = $mainMod, S, togglefloating
bind = $mainMod, Space, exec, vicinae toggle
bind = $mainMod, F, fullscreen, toggle
bind = $mainMod, T, togglegroup
bind = $mainMod SHIFT, TAB, changegroupactive, b
bind = $mainMod, TAB, changegroupactive, f

bind = $mainMod SHIFT, C, exec, hyprctl reload && pkill waybar && waybar && swaync-client -R && swaync-client -rs
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" -  | tee "$HOME/pictures/screenshots"/"screenshot_$(date +%Y%m%d-%H%M%S).png" | wl-copy
bind = $mainMod CTRL, C, exec, hyprpicker

bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, split:workspace, 1
bind = $mainMod, 2, split:workspace, 2
bind = $mainMod, 3, split:workspace, 3
bind = $mainMod, 4, split:workspace, 4
bind = $mainMod, 5, split:workspace, 5
bind = $mainMod, 6, split:workspace, 6
bind = $mainMod, 7, split:workspace, 7
bind = $mainMod, 8, split:workspace, 8
bind = $mainMod, 9, split:workspace, 9
# bind = $mainMod, 0, exec, hyprsome workspace 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, split:movetoworkspace, 1
bind = $mainMod SHIFT, 2, split:movetoworkspace, 2
bind = $mainMod SHIFT, 3, split:movetoworkspace, 3
bind = $mainMod SHIFT, 4, split:movetoworkspace, 4
bind = $mainMod SHIFT, 5, split:movetoworkspace, 5
bind = $mainMod SHIFT, 6, split:movetoworkspace, 6
bind = $mainMod SHIFT, 7, split:movetoworkspace, 7
bind = $mainMod SHIFT, 8, split:movetoworkspace, 8
bind = $mainMod SHIFT, 9, split:movetoworkspace, 9


# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Clamshell mode
bindl = ,switch:off[Lid Switch], exec, fish -c clamshell_mode open
bindl = ,switch:on[Lid Switch], exec, fish -c clamshell_mode close

##############################
### WINDOWS AND WORKSPACES ###
##############################

# # Ignore maximize requests from apps. You'll probably like this.
# windowrule = suppressevent maximize, class:.*
# windowrule = suppressevent maximize, class:.*

# # Fix some dragging issues with XWayland
# windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

layerrule = match:namespace waybar, blur 1

# layerrule {
#   match:namespace = vicinae
#   dimaround = 1
#   ignorealpha = 0
#   blur = 1
# }

# Floating rules
# windowrule = float, size 800 500, class:^(foot)$
windowrule {
  name = foot_resize
  match:title = foot

  float = yes
  size = (monitor_w*0.5) (monitor_h*0.57)
  center = yes
}

windowrule {
  name = cava_resize
  match:title = cava  

  float = yes
  size = (monitor_w*0.32) (monitor_h*0.35)
  center = yes
}
